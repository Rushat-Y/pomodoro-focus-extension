<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pomodoro Focus</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="popup.css" />
</head>
<body>

  <div class="app" id="app" data-phase="work" data-theme="dark">

    <!-- Header -->
    <header class="header">
      <button class="icon-btn" id="themeToggle" title="Toggle theme" aria-label="Toggle theme">
        <svg id="themeIcon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
        </svg>
      </button>
      <span class="app-name">Pomodoro Focus</span>
      <div class="header-actions">
        <button class="icon-btn" id="dashboardBtn" title="Dashboard" aria-label="Open dashboard">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/>
            <rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/>
          </svg>
        </button>
        <button class="icon-btn" id="settingsBtn" title="Settings" aria-label="Settings">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="12" cy="12" r="3"/>
            <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
          </svg>
        </button>
      </div>
    </header>

    <!-- Phase tabs -->
    <div class="phase-tabs">
      <button class="phase-tab active" data-phase="work"       id="tabWork">Focus</button>
      <button class="phase-tab"        data-phase="shortBreak" id="tabShort">Short Break</button>
      <button class="phase-tab"        data-phase="longBreak"  id="tabLong">Long Break</button>
    </div>

    <!-- Timer ring -->
    <div class="ring-container">
      <svg class="ring-svg" viewBox="0 0 220 220">
        <circle cx="110" cy="110" r="96" class="ring-track"/>
        <circle cx="110" cy="110" r="96" class="ring-progress" id="ringProgress"/>
      </svg>
      <div class="ring-inner">
        <div class="time-display" id="timeDisplay">25:00</div>
        <div class="phase-label" id="phaseLabel">Focus Session</div>
      </div>
    </div>

    <!-- Task label input (work phase only) -->
    <div class="label-row" id="labelRow">
      <input
        type="text"
        id="taskLabel"
        class="label-input"
        placeholder="What are you working on?"
        maxlength="60"
        autocomplete="off"
        spellcheck="false"
      />
    </div>

    <!-- Controls -->
    <div class="controls">
      <button class="ctrl-btn secondary" id="resetBtn" title="Reset" aria-label="Reset">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <polyline points="1 4 1 10 7 10"/>
          <path d="M3.51 15a9 9 0 1 0 .49-4.95"/>
        </svg>
      </button>
      <button class="ctrl-btn primary" id="playPauseBtn" aria-label="Start timer">
        <svg id="playIcon" viewBox="0 0 24 24" fill="currentColor">
          <polygon points="6,3 20,12 6,21"/>
        </svg>
        <svg id="pauseIcon" viewBox="0 0 24 24" fill="currentColor" style="display:none">
          <rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/>
        </svg>
      </button>
      <button class="ctrl-btn secondary" id="skipBtn" title="Skip phase" aria-label="Skip">
        <svg viewBox="0 0 24 24" fill="currentColor">
          <polygon points="5,4 15,12 5,20"/>
          <rect x="18" y="4" width="2" height="16"/>
        </svg>
      </button>
    </div>

    <!-- Session progress -->
    <div class="session-row">
      <div class="session-dots" id="sessionDots"></div>
      <div class="session-label" id="sessionLabel">0 / 4 to long break</div>
    </div>

    <!-- Stats bar -->
    <div class="stats-bar">
      <div class="stat">
        <span class="stat-value" id="completedCount">0</span>
        <span class="stat-label">Today</span>
      </div>
      <div class="stat-divider"></div>
      <div class="stat">
        <span class="stat-value" id="focusTime">0m</span>
        <span class="stat-label">Focus time</span>
      </div>
      <div class="stat-divider"></div>
      <div class="stat">
        <span class="stat-value" id="currentStreak">—</span>
        <span class="stat-label">Streak</span>
      </div>
    </div>

  </div>

  <script src="popup.js"></script>
</body>
</html>
